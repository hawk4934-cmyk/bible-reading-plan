<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2C4A6E">
<title>성서읽기 계획표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600&display=swap');

  :root {
    --navy: #2C4A6E;
    --navy-dark: #1a2f45;
    --navy-light: #3d6494;
    --gold: #C9A84C;
    --gold-light: #e8c97a;
    --cream: #F8F4EC;
    --cream-dark: #EDE8DC;
    --text: #2a2a2a;
    --text-muted: #6b7280;
    --check: #4CAF50;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(44,74,110,0.12);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .app-header {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-light) 100%);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
  }
  .app-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-title span { font-size: 1.4rem; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.28); }

  /* Progress bar in header */
  .header-progress {
    padding: 0 20px 14px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.75);
    margin-bottom: 5px;
  }
  .progress-track {
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* ── Nav Tabs ── */
  .nav-tabs {
    display: flex;
    background: var(--navy-dark);
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .nav-tab {
    flex: 1;
    padding: 10px 6px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.55);
    font-size: 0.72rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: color 0.2s, background 0.2s;
    border-bottom: 2px solid transparent;
  }
  .nav-tab .tab-icon { font-size: 1.15rem; }
  .nav-tab.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
    background: rgba(255,255,255,0.05);
  }

  /* ── Main Content ── */
  .main-content { padding: 0; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── 홈 페이지 ── */
  .home-section { padding: 20px; }

  .today-card {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .today-label {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .today-date {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .plan-info {
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .plan-info-title {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 2px;
  }
  .plan-info-text {
    font-size: 0.95rem;
    font-weight: 500;
  }
  .plan-no-active {
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 0.85rem;
    padding: 4px 0;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: white;
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 0.68rem; color: var(--text-muted); }

  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 히브리어/그리스어 성경 진행률 */
  .testament-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .testament-card {
    background: white;
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
  }
  .testament-name {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .testament-pct {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }
  .mini-progress {
    height: 4px;
    background: var(--cream-dark);
    border-radius: 99px;
    overflow: hidden;
  }
  .mini-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s;
  }
  .ot-fill { background: linear-gradient(90deg, var(--navy), var(--navy-light)); }
  .nt-fill { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }

  /* 최근 읽은 기록 */
  .recent-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .recent-item {
    background: white;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 6px rgba(44,74,110,0.08);
  }
  .recent-icon {
    width: 36px; height: 36px;
    background: var(--cream);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .recent-text { flex: 1; min-width: 0; }
  .recent-book { font-size: 0.88rem; font-weight: 500; color: var(--navy); }
  .recent-date { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  .recent-memo { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── 성경 목록 ── */
  .bible-list-page { padding: 16px; }

  .testament-section { margin-bottom: 20px; }
  .testament-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 8px 12px;
    background: var(--navy);
    color: white;
    border-radius: 8px;
  }
  .testament-header-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    font-weight: 600;
    flex: 1;
  }
  .testament-header-count { font-size: 0.72rem; color: rgba(255,255,255,0.65); }

  .category-group { margin-bottom: 12px; }
  .category-label {
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-left: 4px;
  }
  .book-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  @media (min-width: 600px) {
    .book-grid { grid-template-columns: repeat(6, 1fr); }
    .ch-btn { font-size: 1.05rem; min-height: 44px; }
    .bible-list-page { max-width: 900px; margin: 0 auto; }
    .chapter-page { max-width: 900px; margin: 0 auto; }
  }
  @media (min-width: 1024px) {
    .book-grid { grid-template-columns: repeat(10, 1fr); }
    .ch-btn { font-size: 1.1rem; min-height: 48px; }
    .bible-list-page { max-width: 1400px; }
    .chapter-page { max-width: 1400px; }
    .home-section { max-width: 760px; margin: 0 auto; }
    .stats-page { max-width: 760px; margin: 0 auto; }
    .plan-page { max-width: 760px; margin: 0 auto; }
  }
  .book-btn {
    background: white;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    padding: 10px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    position: relative;
    box-shadow: 0 1px 4px rgba(44,74,110,0.07);
  }
  .book-btn:hover { border-color: var(--navy-light); transform: translateY(-1px); }
  .book-btn.completed { background: var(--navy); border-color: var(--navy); color: white; }
  .book-btn.in-progress { border-color: var(--gold); background: #fffdf5; }
  .book-name { font-size: 0.75rem; font-weight: 500; line-height: 1.2; }
  .book-progress-dot {
    position: absolute;
    top: 4px; right: 4px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }
  .book-btn.completed .book-progress-dot { background: rgba(255,255,255,0.6); }

  /* ── 장 목록 ── */
  .chapter-page { padding: 16px; }

  .chapter-back-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .back-btn {
    background: white;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    box-shadow: var(--shadow);
  }
  .chapter-book-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--navy);
  }
  .chapter-book-sub { font-size: 0.72rem; color: var(--text-muted); }

  .chapter-book-progress {
    background: white;
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .cbp-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: conic-gradient(var(--navy) 0%, var(--cream-dark) 0%);
    flex-shrink: 0;
    position: relative;
  }
  .cbp-inner {
    position: absolute;
    width: 36px; height: 36px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--navy);
  }
  .cbp-text { flex: 1; }
  .cbp-label { font-size: 0.72rem; color: var(--text-muted); }
  .cbp-value { font-size: 0.95rem; font-weight: 500; color: var(--navy); margin-top: 2px; }

  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* JS로 덮어씀 */
    gap: 6px;
    margin-bottom: 16px;
  }
  .ch-btn {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1.5px solid var(--cream-dark);
    background: white;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    position: relative;
    transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    box-shadow: 0 1px 4px rgba(44,74,110,0.07);
  }
  .ch-btn:hover { border-color: var(--navy-light); transform: translateY(-1px); }
  .ch-btn.read {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
  }
  .ch-btn.has-memo::after {
    content: '✏️';
    font-size: 0.55rem;
    position: absolute;
    top: 2px; right: 3px;
    line-height: 1;
  }
  .ch-btn.read.has-memo::after { content: '✏️'; filter: brightness(0) invert(1); opacity: 0.7; }
  .ch-read-date { font-size: 0.5rem; color: rgba(255,255,255,0.7); line-height: 1; }

  /* ── 메모 모달 ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.28s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--cream-dark);
    border-radius: 99px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 16px;
  }

  .modal-check-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: var(--cream);
    border-radius: 10px;
    margin-bottom: 16px;
    cursor: pointer;
  }
  .check-toggle {
    width: 44px; height: 24px;
    background: var(--cream-dark);
    border-radius: 99px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .check-toggle.on { background: var(--check); }
  .check-toggle::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: left 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .check-toggle.on::after { left: 23px; }
  .check-label { font-size: 0.9rem; font-weight: 500; }

  .date-read-display {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .memo-label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .memo-textarea {
    width: 100%;
    height: 120px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 10px;
    padding: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.88rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .memo-textarea:focus { border-color: var(--navy-light); }
  .memo-char { font-size: 0.7rem; color: var(--text-muted); text-align: right; margin-top: 4px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-cancel {
    flex: 1;
    padding: 13px;
    border: 1.5px solid var(--cream-dark);
    background: white;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--text-muted);
  }
  .btn-save {
    flex: 2;
    padding: 13px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--navy-light); }
  .btn-unread {
    flex: 1.2;
    padding: 13px;
    background: #fef3c7;
    border: 1.5px solid #f59e0b;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: #92400e;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-unread:hover { background: #fde68a; }

  /* ── 계획 페이지 ── */
  .plan-page { padding: 16px; }

  .plan-type-selector {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .plan-type-btn {
    background: white;
    border: 1.5px solid var(--cream-dark);
    border-radius: 10px;
    padding: 14px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    box-shadow: var(--shadow);
  }
  .plan-type-btn.active { background: var(--navy); border-color: var(--navy); color: white; }
  .plan-type-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .plan-type-name { font-size: 0.75rem; font-weight: 500; line-height: 1.3; }

  .plan-card {
    background: white;
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .plan-card-title {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; display: block; }
  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.88rem;
    outline: none;
    background: var(--cream);
    color: var(--text);
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--navy-light); background: white; }

  .plan-apply-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .plan-apply-btn:hover { opacity: 0.9; }

  .active-plan-display {
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    color: white;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
  }
  .apd-label { font-size: 0.7rem; color: rgba(255,255,255,0.65); margin-bottom: 4px; }
  .apd-title { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
  .apd-stats {
    display: flex;
    gap: 8px;
  }
  .apd-stat {
    flex: 1;
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }
  .apd-stat-num { font-size: 1.1rem; font-weight: 700; }
  .apd-stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.65); margin-top: 2px; }

  .plan-cancel-btn {
    width: 100%;
    padding: 11px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 12px;
  }

  /* ── 통계 페이지 ── */
  .stats-page { padding: 16px; }

  .stats-overview {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stats-big-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .stats-big-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stats-big-sub { font-size: 0.7rem; color: var(--text-muted); }
  .streak-card {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--navy-dark);
  }
  .streak-card .stats-big-num { color: var(--navy-dark); }

  /* 달력 뷰 */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

// 인메모리 캐시 (Firestore 읽기 최소화)
let _cache = null;        // 챕터 데이터 전체
let _planCache = null;    // 계획
let _rangeCache = null;   // 범위 기록
let _cacheLoaded = false;

// 전체 데이터 1회 로드 후 캐시
async function ensureCache() {
  if(_cacheLoaded) return;
  showLoading('데이터 불러오는 중...');

  // 10초 타임아웃 — 무한 로딩 방지
  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('timeout')), 10000)
  );

  try {
    await Promise.race([
      (async () => {
        const [chapDoc, planDoc, rangeDoc] = await Promise.all([
          db.collection('users').doc(USER_ID).collection('data').doc('chapters').get(),
          db.collection('users').doc(USER_ID).collection('data').doc('plan').get(),
          db.collection('users').doc(USER_ID).collection('data').doc('rangeHistory').get()
        ]);
        _cache      = chapDoc.exists  ? chapDoc.data()         : {};
        _planCache  = planDoc.exists  ? planDoc.data().plan || null : null;
        _rangeCache = rangeDoc.exists ? rangeDoc.data().list || [] : [];
        _cacheLoaded = true;
      })(),
      timeout
    ]);
  } catch(e) {
    console.error('Firebase 로드 오류:', e);
    _cache = {};
    _planCache = null;
    _rangeCache = [];
    _cacheLoaded = true;
    // hideLoading 먼저, toast는 그 다음
    hideLoading();
    setTimeout(() => showToast(
      e.message === 'timeout'
        ? '⚠️ 연결 시간 초과. 오프라인 모드로 실행'
        : '⚠️ 데이터 로드 실패. 오프라인 모드로 실행'
    ), 100);
    return;
  }
  hideLoading();
}

// key: bookId_chapterNum → {read:bool, date:string, memo:string}
function getChapterKey(bookId, ch) { return `${bookId}_${ch}`; }

function getChapterData(bookId, ch) {
  const data = loadData();
  return data[getChapterKey(bookId, ch)] || {read:false, date:null, memo:''};
}

function setChapterData(bookId, ch, obj) {

}

// 통계 계산
function calcStats() {
  const data = loadData();
  let totalRead = 0, otRead = 0, ntRead = 0, memoCount = 0;
  const readDates = {};

  ALL_BOOKS.forEach(book => {
    let bookRead = 0;
    for(let c=1; c<=book.chapters; c++) {
      const cd = data[getChapterKey(book.id, c)];
      if(cd && cd.read) {
        totalRead++;
        bookRead++;
        if(book.testament === 'ot') otRead++;
        else ntRead++;
        if(cd.date) {
          readDates[cd.date] = (readDates[cd.date]||0)+1;
        }
      }
      if(cd && cd.memo) memoCount++;
    }
  });

  // 연속 일수
  const today = new Date();
  let streak = 0;
  for(let i=0;;i++) {
    const d = new Date(today);
    d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    if(readDates[key]) { streak++; }
    else if(i > 0) break;
    if(i > 365) break;
  }

  // 이번달
  const ym = today.toISOString().slice(0,7);
  const thisMonth = Object.entries(readDates).filter(([k])=>k.startsWith(ym)).reduce((s,[,v])=>s+v,0);

  return {totalRead, otRead, ntRead, memoCount, streak, readDates, thisMonth};
}

function countCompletedBooks() {
  const data = loadData();
  return ALL_BOOKS.filter(book => {
    for(let c=1;c<=book.chapters;c++) {
      const cd = data[getChapterKey(book.id,c)];
      if(!cd||!cd.read) return false;
    }
    return true;
  }).length;
}

let currentBibleFilter = 'all';

function setBibleFilter(filter, btn) {
  currentBibleFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBibleList();
}

function renderBibleList() {
  const content = document.getElementById('bibleListContent');
  if(!content) return;
  const data = loadData();

  function getBookProgress(book) {
    let read = 0;
    for(let c=1;c<=book.chapters;c++) {
      const cd = data[getChapterKey(book.id,c)];
      if(cd&&cd.read) read++;
    }
    return read;
  }

  function bookMatchesFilter(book) {
    const read = getBookProgress(book);
    if(currentBibleFilter === 'all') return true;
    if(currentBibleFilter === 'read') return read === book.chapters;
    if(currentBibleFilter === 'unread') return read === 0;
    if(currentBibleFilter === 'inprogress') return read > 0 && read < book.chapters;
    return true;
  }

  let html = '';
  ['ot','nt'].forEach(t => {
    const td = BIBLE_DATA[t];
    const tTotal = td.categories.flatMap(c=>c.books).reduce((s,b)=>s+b.chapters,0);
    const tRead = td.categories.flatMap(c=>c.books).reduce((s,b)=>s+getBookProgress(b),0);
    const tPct = Math.round(tRead/tTotal*100);

    let catHtml = '';
    td.categories.forEach(cat => {
      const filtered = cat.books.filter(bookMatchesFilter);
      if(filtered.length === 0) return;
      catHtml += `<div class="category-group">
        <div class="category-label">${cat.name}</div>
        <div class="book-grid">`;
      filtered.forEach(book => {
        const read = getBookProgress(book);
        const cls = read===book.chapters ? 'completed' : read>0 ? 'in-progress' : '';
        const dot = (read>0&&read<book.chapters) ? '<div class="book-progress-dot"></div>' : '';
        catHtml += `<button class="book-btn ${cls}" onclick="openBook('${book.id}')">
          ${dot}
          <div class="book-name">${book.name}</div>
        </button>`;
      });
      catHtml += `</div></div>`;
    });

    if(catHtml) {
      html += `<div class="testament-section">
        <div class="testament-header">
          <span>${td.icon}</span>
          <span class="testament-header-name">${td.name}</span>
          <span class="testament-header-count">${tRead}/${tTotal}장 (${tPct}%)</span>
        </div>${catHtml}</div>`;
    }
  });

  if(!html) {
    html = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">해당하는 성경이 없어요</div></div>`;
  }
  content.innerHTML = html;
}

function renderChapters() {
  const data = loadData();
  let readCount = 0;
  const book = currentBook;

  // 진행률 원형
  let gridHtml = '';
  for(let c=1;c<=book.chapters;c++) {
    const cd = data[getChapterKey(book.id,c)] || {};
    const isRead = cd.read || false;
    const hasMemo = cd.memo && cd.memo.trim().length > 0;
    if(isRead) readCount++;
    const dateStr = isRead && cd.date ? cd.date.slice(5) : '';
    gridHtml += `<button class="ch-btn ${isRead?'read':''} ${hasMemo?'has-memo':''}"
      onclick="openMemoModal('${book.id}',${c})">
      ${c}
      ${isRead&&dateStr ? `<div class="ch-read-date">${dateStr}</div>` : ''}
    </button>`;
  }
  document.getElementById('chapterGrid').innerHTML = gridHtml;
  setChapterGridCols(); // 열 수 동적 적용

  const pct = Math.round(readCount/book.chapters*100);
  const deg = pct*3.6;
  const prog = document.getElementById('chapterBookProgress');
  prog.innerHTML = `
    <div class="cbp-circle" style="background:conic-gradient(#2C4A6E ${deg}deg, #EDE8DC ${deg}deg)">
      <div class="cbp-inner">${pct}%</div>
    </div>
    <div class="cbp-text">
      <div class="cbp-label">진행률</div>
      <div class="cbp-value">${readCount} / ${book.chapters} 장 완료</div>
    </div>
  `;
}

let selectedPlanType = '1year';

function selectPlanType(type, btn) {
  selectedPlanType = type;
  document.querySelectorAll('.plan-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateDailyChaptersDisplay();
  document.getElementById('customDaysRow').style.display = type==='custom' ? 'block' : 'none';
}

function updateDailyChaptersDisplay() {
  const days = selectedPlanType==='1year' ? 365 : selectedPlanType==='6month' ? 183 :
    (parseInt(document.getElementById('customDays')?.value)||180);
  const perDay = (TOTAL_CHAPTERS / days).toFixed(1);
  document.getElementById('dailyChaptersDisplay').value = `약 ${perDay}장 (하루)`;
}

document.addEventListener('input', function(e) {
  if(e.target.id==='customDays') updateDailyChaptersDisplay();
});

async function applyPlan() {
  const startDate = document.getElementById('planStartDate').value;
  if(!startDate) { showToast('⚠️ 시작 날짜를 선택해주세요'); return; }
  const totalDays = selectedPlanType==='1year' ? 365 : selectedPlanType==='6month' ? 183 :
    (parseInt(document.getElementById('customDays').value)||180);
  const dailyChapters = parseFloat((TOTAL_CHAPTERS/totalDays).toFixed(1));
  const planName = document.getElementById('planName').value.trim() || `${selectedPlanType==='1year'?'1년':selectedPlanType==='6month'?'6개월':'직접설정'} 완독 계획`;
  await savePlan({startDate, totalDays, dailyChapters, planName, type:selectedPlanType});
  showToast('🎉 계획이 시작되었어요!');
  renderPlan();
}

function renderPlan() {
  const plan = loadPlan();
  const activeSection = document.getElementById('activePlanSection');
  const setupSection = document.getElementById('planSetupSection');
  if(plan) {
    activeSection.style.display='block';
    const start = new Date(plan.startDate);
    const now = new Date();
    const diffDays = Math.floor((now-start)/(1000*60*60*24))+1;
    const {totalRead} = calcStats();
    const expectedRead = Math.round(plan.dailyChapters * diffDays);
    activeSection.innerHTML = `
      <div class="section-title" style="margin-bottom:12px">📅 진행 중인 계획</div>
      <div class="active-plan-display">
        <div class="apd-label">현재 계획</div>
        <div class="apd-title">${plan.planName}</div>
        <div class="apd-stats">
          <div class="apd-stat"><div class="apd-stat-num">${diffDays}일</div><div class="apd-stat-label">진행 일수</div></div>
          <div class="apd-stat"><div class="apd-stat-num">${plan.dailyChapters}</div><div class="apd-stat-label">하루 목표</div></div>
          <div class="apd-stat"><div class="apd-stat-num">${totalRead}</div><div class="apd-stat-label">읽은 장</div></div>
          <div class="apd-stat"><div class="apd-stat-num">${Math.max(0,expectedRead-totalRead)}</div><div class="apd-stat-label">뒤처진 장</div></div>
        </div>
        <button class="plan-cancel-btn" onclick="cancelPlan()">계획 취소하기</button>
      </div>`;
    setupSection.style.display='none';
  } else {
    activeSection.style.display='none';
    setupSection.style.display='block';
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('planStartDate').value = today;
    updateDailyChaptersDisplay();
  }
  // 자유범위 UI 초기화
  setTimeout(() => { initFreeRangeUI(); renderFreeRangeHistory(); }, 50);
}

async function cancelPlan() {
  if(confirm('계획을 취소하시겠습니까?\n읽기 기록은 그대로 유지됩니다.')) {
    await savePlan(null);
    renderPlan();
    showToast('계획이 취소되었어요');
  }
}

function renderStats() {
  const {totalRead, streak, thisMonth} = calcStats();
  const completedBooks = countCompletedBooks();
  document.getElementById('statsTotalRead').textContent = totalRead;
  document.getElementById('statsStreak').textContent = streak;
  document.getElementById('statsTotalBooks').textContent = completedBooks;
  document.getElementById('statsThisMonth').textContent = thisMonth;

  // 성경별 진행률 (진행중 또는 완료된 것만)
  const data = loadData();
  const bookProgress = ALL_BOOKS.map(book => {
    let read = 0;
    for(let c=1;c<=book.chapters;c++) {
      const cd = data[getChapterKey(book.id,c)];
      if(cd&&cd.read) read++;
    }
    return {book, read, pct: Math.round(read/book.chapters*100)};
  }).filter(b=>b.read>0).sort((a,b)=>b.pct-a.pct).slice(0,10);

  const barsEl = document.getElementById('bookBars');
  if(bookProgress.length===0) {
    barsEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">아직 읽은 기록이 없어요</div></div>`;
  } else {
    barsEl.innerHTML = bookProgress.map(({book,read,pct}) => `
      <div class="book-bar-row">
        <div class="book-bar-name">${book.name}</div>
        <div class="book-bar-track"><div class="book-bar-fill" style="width:${pct}%"></div></div>
        <div class="book-bar-pct">${pct}%</div>
      </div>
    `).join('');
  }
}

// ── 달력 ──
let calYear, calMonth, calSelectedDate = null;
function initCal() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
}
function changeCalMonth(delta) {
  calMonth += delta;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  calSelectedDate = null;
  renderCalendar();
}

function renderCalendar() {
  const {readDates} = calcStats();
  const now = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${calYear}년 ${months[calMonth]}`;

  let html = '';
  for(let i=0;i<firstDay;i++) html += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const count = readDates[dateStr] || 0;
    const isToday = now.getFullYear()===calYear && now.getMonth()===calMonth && now.getDate()===d;
    const isSelected = calSelectedDate === dateStr;
    const cls = ['cal-day', isToday?'today':'', count>0?'has-read':'', isSelected?'cal-selected':''].filter(Boolean).join(' ');
    const clickAttr = count > 0 ? `onclick="showCalDetail('${dateStr}')"` : '';
    html += `<div class="${cls}" ${clickAttr}>${d}${count>0?`<div class="cal-day-count">${count}</div>`:''}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  // 선택된 날짜 상세 유지
  if(calSelectedDate) showCalDetail(calSelectedDate, true);
  else { const box = document.getElementById('calDetailBox'); if(box) box.style.display='none'; }
}

function showCalDetail(dateStr, keepSelected=false) {
  if(!keepSelected) {
    calSelectedDate = calSelectedDate === dateStr ? null : dateStr;
    renderCalendar();
    return;
  }
  const data = loadData();
  const items = [];
  ALL_BOOKS.forEach(book => {
    for(let c=1;c<=book.chapters;c++) {
      const cd = data[getChapterKey(book.id,c)];
      if(cd && cd.read && cd.date === dateStr) {
        items.push({book, chapter:c, memo: cd.memo||''});
      }
    }
  });
  const box = document.getElementById('calDetailBox');
  if(!box) return;
  if(items.length === 0) { box.style.display='none'; return; }

  const [y,m,d] = dateStr.split('-');
  box.style.display = 'block';
  box.innerHTML = `
    <div class="cal-detail-title">📅 ${parseInt(m)}월 ${parseInt(d)}일 · ${items.length}장 읽음</div>
    ${items.map(it => `
      <div class="cal-detail-item" onclick="goToBookmark('${it.book.id}',${it.chapter})">
        <span class="cal-detail-icon">${it.book.testament==='ot'?'📜':'✝️'}</span>
        <span>${it.book.name} ${it.chapter}장</span>
        ${it.memo ? `<span style="color:var(--text-muted);font-size:0.72rem;margin-left:auto">✏️</span>` : ''}
        <span style="color:var(--navy-light);margin-left:auto">→</span>
      </div>
    `).join('')}
  `;
}

// 책갈피 이동: 홈에서 해당 성경 장으로 바로 이동
function goToBookmark(bookId, chapter) {
  // 성경 탭으로 이동
  const bibleTab = document.querySelectorAll('.nav-tab')[1];
  showPage('bible', bibleTab);
  // 해당 책 장 뷰 열기
  setTimeout(() => {
    openBook(bookId);
    // 해당 장 하이라이트
    setTimeout(() => {
      const btns = document.querySelectorAll('.ch-btn');
      if(btns[chapter-1]) {
        btns[chapter-1].scrollIntoView({behavior:'smooth', block:'center'});
        btns[chapter-1].style.outline = '3px solid var(--gold)';
        setTimeout(()=>{ btns[chapter-1].style.outline=''; }, 1800);
      }
    }, 100);
  }, 50);
}

function showToast(msg) {
  const t = document.getElementById('toast');

}

// ── 새로고침 ──
async function refreshApp() {
  const btn = document.getElementById('refreshBtn');
  if(btn) { btn.style.animation = 'spin 0.8s linear infinite'; btn.style.opacity = '0.6'; }
  _cacheLoaded = false;
  _cache = null;
  _planCache = null;
  _rangeCache = null;
  try {
    await ensureCache();
    // 현재 활성 탭 다시 렌더
    const activePage = document.querySelector('.page.active');
    if(activePage) {
      const id = activePage.id;
      if(id==='page-home') renderHome();
      else if(id==='page-bible') renderBibleList();
      else if(id==='page-plan') renderPlan();
      else if(id==='page-stats') { renderStats(); renderCalendar(); }
    }
    updateHeaderProgress();
    showToast('✅ 데이터를 새로 불러왔어요!');
  } catch(e) {
    showToast('⚠️ 새로고침 실패');
  }
  if(btn) { btn.style.animation = ''; btn.style.opacity = '1'; }
}

async function confirmReset() {
  if(confirm('⚠️ 정말로 모든 읽기 기록을 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
    if(confirm('마지막 확인: 모든 데이터가 삭제됩니다.')) {
      showLoading('초기화 중...');
      try {
        await db.collection('users').doc(USER_ID).collection('data').doc('chapters').delete();
        _cache = {};
        showToast('🗑️ 초기화 완료');
        renderHome(); renderBibleList(); renderStats(); renderCalendar();
        updateHeaderProgress();
      } catch(e) { showToast('⚠️ 초기화 실패'); }
      hideLoading();
    }
  }
}

// 자유 범위 읽기
// ═══════════════════════════════════════════════
function initFreeRangeUI() {
  const bookSel = document.getElementById('freeBook');
  if(!bookSel) return;
  bookSel.innerHTML = ALL_BOOKS.map(b =>
    `<option value="${b.id}">${b.name} (${b.testament==='ot'?'히브리어':'그리스어'})</option>`
  ).join('');
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('freeDateInput').value = today;
  updateFreeChapters();

  // 범위 변경 시 미리보기 업데이트
  ['freeBook','freeChStart','freeChEnd'].forEach(id => {
    document.getElementById(id).addEventListener('change', updateFreePreview);
  });
}

function updateFreeChapters() {
  const bookId = document.getElementById('freeBook').value;
  const book = ALL_BOOKS.find(b=>b.id===bookId);
  if(!book) return;
  const startSel = document.getElementById('freeChStart');
  const endSel = document.getElementById('freeChEnd');
  startSel.innerHTML = Array.from({length:book.chapters},(_,i)=>`<option value="${i+1}">${i+1}장</option>`).join('');
  endSel.innerHTML = Array.from({length:book.chapters},(_,i)=>`<option value="${i+1}">${i+1}장</option>`).join('');
  endSel.value = book.chapters; // 기본값: 마지막 장
  updateFreePreview();
}

function updateFreePreview() {
  const bookId = document.getElementById('freeBook').value;
  const book = ALL_BOOKS.find(b=>b.id===bookId);
  const start = parseInt(document.getElementById('freeChStart').value);
  const end = parseInt(document.getElementById('freeChEnd').value);
  const preview = document.getElementById('freeRangePreview');
  if(!book || !preview) return;
  const actualEnd = Math.max(start, end);
  const count = actualEnd - start + 1;

  // 이미 읽은 장 체크
  const data = loadData();
  const alreadyRead = [];
  for(let c=start; c<=actualEnd; c++) {
    const cd = data[getChapterKey(bookId, c)];
    if(cd && cd.read) alreadyRead.push(c);
  }

  preview.style.display = 'block';
  preview.innerHTML = `
    <strong>${book.name} ${start}~${actualEnd}장</strong> · 총 ${count}장
    ${alreadyRead.length > 0
      ? `<span style="color:var(--text-muted);margin-left:8px">(이미 읽은 장: ${alreadyRead.join(', ')}장)</span>`
      : ''}
  `;
}

async function applyFreeRange(markRead) {
  const bookId = document.getElementById('freeBook').value;
  const book = ALL_BOOKS.find(b=>b.id===bookId);
  const start = parseInt(document.getElementById('freeChStart').value);
  const end = parseInt(document.getElementById('freeChEnd').value);
  const dateVal = document.getElementById('freeDateInput').value;
  const memo = document.getElementById('freeMemo').value.trim();
  const actualEnd = Math.max(start, end);

  if(!dateVal) { showToast('⚠️ 날짜를 선택해주세요'); return; }

  const data = loadData();
  for(let c=start; c<=actualEnd; c++) {
    const key = getChapterKey(bookId, c);
    const existing = data[key] || {};
    data[key] = {
      read: markRead,
      date: markRead ? (existing.read && existing.date ? existing.date : dateVal) : null,
      memo: memo || existing.memo || ''
    };
  }
  saveData(data);

  // 범위 기록 저장
  const rangeHistory = loadRangeHistory();
  if(markRead) {
    rangeHistory.unshift({
      bookId, bookName: book.name, start, end: actualEnd,
      date: dateVal, memo, count: actualEnd - start + 1,
      savedAt: new Date().toISOString()
    });
    if(rangeHistory.length > 20) rangeHistory.pop();
    await saveRangeHistory(rangeHistory);
  }

  const count = actualEnd - start + 1;
  showToast(markRead
    ? `✅ ${book.name} ${start}~${actualEnd}장 (${count}장) 읽음 처리!`
    : `↩️ ${book.name} ${start}~${actualEnd}장 읽지 않음으로 변경`);

  updateHeaderProgress();
  renderFreeRangeHistory();
  updateFreePreview();
}

function renderFreeRangeHistory() {
  const el = document.getElementById('freeRangeHistory');
  if(!el) return;
  const history = loadRangeHistory();
  if(history.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:0.82rem">아직 범위 읽기 기록이 없어요</div>`;
    return;
  }
  el.innerHTML = history.map((r, i) => `
    <div style="background:white;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 6px rgba(44,74,110,0.08)">
      <div style="width:38px;height:38px;background:var(--cream);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">📌</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:0.88rem;font-weight:500;color:var(--navy)">${r.bookName} ${r.start}~${r.end}장 <span style="font-weight:400;color:var(--text-muted)">(${r.count}장)</span></div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px">${r.date}</div>
        ${r.memo ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">✏️ ${r.memo}</div>` : ''}
      </div>
      <button onclick="deleteRangeHistory(${i})" style="background:none;border:none;color:#ccc;font-size:1rem;cursor:pointer;padding:4px">🗑</button>
    </div>
  `).join('');
}

async function deleteRangeHistory(index) {
  const h = loadRangeHistory();
  h.splice(index, 1);
  await saveRangeHistory(h);
  renderFreeRangeHistory();
}
